<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CorpFlow Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    <div class="max-w-xl mx-auto px-4 py-14">
      <h1 class="text-2xl font-semibold tracking-tight">Login</h1>
      <p class="text-slate-400 text-sm mt-2">
        Choose your access level. This sets a secure session cookie so you don’t paste keys into pages.
      </p>

      <div id="banner" class="hidden mt-6 rounded-xl border border-rose-500/30 bg-rose-500/10 px-4 py-3 text-rose-200 text-sm"></div>
      <div id="ok" class="hidden mt-6 rounded-xl border border-emerald-500/30 bg-emerald-500/10 px-4 py-3 text-emerald-200 text-sm"></div>

      <div class="mt-8 grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="rounded-2xl border border-slate-800 bg-slate-900/30 p-4">
          <h2 class="text-sm font-semibold">Factory Admin</h2>
          <p class="text-xs text-slate-400 mt-1">For you only: full factory access.</p>
          <label class="block text-xs text-slate-300 mt-4">Username
            <input id="adminUser" class="mt-1 w-full rounded-lg bg-slate-950 border border-slate-800 px-3 py-2 text-sm" />
          </label>
          <label class="block text-xs text-slate-300 mt-3">Password
            <input id="adminPass" type="password" class="mt-1 w-full rounded-lg bg-slate-950 border border-slate-800 px-3 py-2 text-sm" />
          </label>
          <button id="btnAdmin" class="mt-4 w-full rounded-lg bg-sky-500 text-slate-950 px-4 py-2 text-sm font-semibold">Login as Admin</button>
        </div>

        <div class="rounded-2xl border border-slate-800 bg-slate-900/30 p-4">
          <h2 class="text-sm font-semibold">Client / Tenant</h2>
          <p class="text-xs text-slate-400 mt-1">Tenant-scoped access (no factory settings).</p>
          <label class="block text-xs text-slate-300 mt-4">Tenant ID
            <input id="tenantId" class="mt-1 w-full rounded-lg bg-slate-950 border border-slate-800 px-3 py-2 text-sm" placeholder="e.g. corpflowai" />
          </label>
          <label class="block text-xs text-slate-300 mt-3">PIN / Password
            <input id="tenantPin" type="password" class="mt-1 w-full rounded-lg bg-slate-950 border border-slate-800 px-3 py-2 text-sm" autocomplete="one-time-code" />
          </label>
          <button id="btnTenant" class="mt-4 w-full rounded-lg border border-slate-700 px-4 py-2 text-sm font-semibold">Login as Tenant</button>
        </div>
      </div>

      <div class="mt-8 flex gap-3 flex-wrap">
        <a class="text-sky-300 text-sm underline" href="/change">Go to Change Console</a>
        <button id="btnLogout" class="text-slate-300 text-sm underline">Logout</button>
      </div>
    </div>

    <script>
      (function () {
        const $ = (id) => document.getElementById(id);
        const banner = $('banner');
        const ok = $('ok');
        function err(msg) {
          ok.classList.add('hidden');
          ok.textContent = '';
          if (!msg) {
            banner.classList.add('hidden');
            banner.textContent = '';
            return;
          }
          banner.classList.remove('hidden');
          banner.textContent = msg;
        }
        function good(msg) {
          banner.classList.add('hidden');
          banner.textContent = '';
          ok.classList.remove('hidden');
          ok.textContent = msg;
        }

        async function post(path, body) {
          const r = await fetch(path, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify(body || {}),
          });
          const j = await r.json().catch(() => ({}));
          if (!r.ok) throw new Error(j.error || j.detail || ('http_' + r.status));
          return j;
        }

        $('btnAdmin').addEventListener('click', async () => {
          err('');
          try {
            const j = await post('/api/auth/login', {
              level: 'admin',
              username: $('adminUser').value,
              password: $('adminPass').value,
            });
            good('Logged in as admin. Session cookie set.');
          } catch (e) {
            err(String(e.message || e));
          }
        });

        $('btnTenant').addEventListener('click', async () => {
          err('');
          try {
            const j = await post('/api/auth/login', {
              level: 'tenant',
              tenant_id: $('tenantId').value,
              pin: $('tenantPin').value,
            });
            good('Logged in as tenant. Session cookie set.');
          } catch (e) {
            err(String(e.message || e));
          }
        });

        $('btnLogout').addEventListener('click', async () => {
          err('');
          try {
            await post('/api/auth/logout', {});
            good('Logged out.');
          } catch (e) {
            err(String(e.message || e));
          }
        });

        // Show current session
        fetch('/api/auth/me', { credentials: 'include' })
          .then((r) => r.json())
          .then((j) => {
            if (j && j.logged_in) {
              good('Already logged in as ' + j.level + (j.tenant_id ? ' (' + j.tenant_id + ')' : '') + '.');
            }
          })
          .catch(() => {});
      })();
    </script>
  </body>
</html>

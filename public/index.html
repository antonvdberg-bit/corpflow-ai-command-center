<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CorpFlow</title>
    <style>
      :root {
        --cf-bg: #020617;
        --cf-surface: #0b1220;
        --cf-text: #e2e8f0;
        --cf-muted: #94a3b8;
        --cf-primary: #0ea5e9;
        --cf-accent: #22c55e;
      }
      body { margin: 0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji"; background: var(--cf-bg); color: var(--cf-text); }
      .wrap { max-width: 1120px; margin: 0 auto; padding: 40px 20px; }
      .card { border-radius: 18px; border: 1px solid rgba(255,255,255,0.10); background: var(--cf-surface); padding: 18px; }
      .muted { color: var(--cf-muted); }
      a.btn { display: inline-block; padding: 10px 14px; border-radius: 14px; background: var(--cf-primary); color: #020617; font-weight: 700; font-size: 13px; text-decoration: none; }
      .grid { display: grid; grid-template-columns: 1fr; gap: 18px; margin-top: 18px; }
      input, select, textarea { width: 100%; box-sizing: border-box; padding: 10px 12px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.10); background: rgba(0,0,0,0.18); color: var(--cf-text); }
      button { width: 100%; padding: 10px 12px; border-radius: 14px; border: none; background: var(--cf-accent); color: #020617; font-weight: 800; }
      @media (min-width: 900px) { .grid-2 { grid-template-columns: 1fr 1fr; } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div id="top" class="card">
        <div class="muted" style="font-size: 12px; letter-spacing: 0.6px;">Preview</div>
        <div id="title" style="font-size: 20px; font-weight: 700; margin-top: 4px;">Loading…</div>
        <div style="display:flex; gap:10px; align-items:center; margin-top: 10px;">
          <a id="cta" class="btn" href="/change">Request changes</a>
          <a class="muted" href="/lux-guide" style="font-size: 13px;">How to request changes</a>
        </div>
      </div>

      <div class="grid grid-2">
        <div class="card">
          <div class="muted" style="font-size: 11px; letter-spacing: 1.2px; text-transform: uppercase;">Welcome</div>
          <div id="subtitle" style="margin-top: 8px; font-size: 28px; line-height: 1.15; font-weight: 800;">Loading…</div>
          <div class="muted" style="margin-top: 12px; font-size: 12px;">
            Tenant: <span id="tenant" style="font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;">—</span>
          </div>
        </div>
        <div class="card">
          <div class="muted" style="font-size: 11px; letter-spacing: 1.2px; text-transform: uppercase;">About</div>
          <div id="about" style="margin-top: 10px; font-size: 14px; line-height: 1.6; color: rgba(226,232,240,0.92);">Loading…</div>
        </div>
      </div>

      <div class="card" style="margin-top: 18px;">
        <div class="muted" style="font-size: 11px; letter-spacing: 1.2px; text-transform: uppercase;">Enquire</div>
        <form id="enquiry" style="margin-top: 12px; display:grid; gap:10px;">
          <input name="name" placeholder="Name" />
          <input required name="email" placeholder="Email" />
          <select name="region">
            <option value="">Region focus (optional)</option>
            <option value="FR">France / French-speaking Europe</option>
            <option value="ZA">South Africa</option>
            <option value="EE">Eastern Europe</option>
            <option value="RU">Russia</option>
          </select>
          <select name="budget">
            <option value="">Budget (USD, optional)</option>
            <option value="2-3M">2–3M</option>
            <option value="3-5M">3–5M</option>
            <option value="5-10M">5–10M</option>
            <option value="10M+">10M+</option>
          </select>
          <textarea required name="message" rows="4" placeholder="Message"></textarea>
          <button type="submit">Submit enquiry</button>
        </form>
        <div id="msg" class="muted" style="margin-top: 10px; font-size: 12px;">Loading tenant…</div>
      </div>

      <div class="muted" style="margin-top: 18px; text-align:center; font-size: 12px;">
        Powered by CorpFlow · Draft preview for rapid iteration in the Change Console
      </div>
    </div>

    <script>
      const msg = (t) => { document.getElementById('msg').textContent = t; };
      function applyTheme(theme) {
        if (!theme) return;
        const r = document.documentElement;
        if (theme.background) r.style.setProperty('--cf-bg', theme.background);
        if (theme.surface) r.style.setProperty('--cf-surface', theme.surface);
        if (theme.text) r.style.setProperty('--cf-text', theme.text);
        if (theme.muted) r.style.setProperty('--cf-muted', theme.muted);
        if (theme.primary) r.style.setProperty('--cf-primary', theme.primary);
        if (theme.accent) r.style.setProperty('--cf-accent', theme.accent);
      }

      async function load() {
        try {
          const r = await fetch('/api/tenant/site', { method: 'GET' });
          const j = await r.json().catch(() => ({}));
          const site = j && j.site ? j.site : null;
          if (!site || !j.tenant_id) {
            document.getElementById('title').textContent = 'CorpFlow';
            document.getElementById('subtitle').textContent = 'Preview not configured for this host yet.';
            document.getElementById('about').textContent = 'This domain is not mapped to a tenant yet.';
            document.getElementById('tenant').textContent = '—';
            msg('Ask an operator to map this hostname to a tenant_id.');
            return;
          }
          applyTheme(site.theme || {});
          document.getElementById('title').textContent = (site.hero && site.hero.title) ? site.hero.title : 'Tenant';
          document.getElementById('subtitle').textContent = (site.hero && site.hero.subtitle) ? site.hero.subtitle : '';
          document.getElementById('about').textContent = (site.sections && site.sections.about && site.sections.about.body) ? site.sections.about.body : '';
          document.getElementById('tenant').textContent = j.tenant_id || '';
          msg('High-net-worth enquiries only. We respond within 1 business day.');
        } catch (e) {
          document.getElementById('title').textContent = 'CorpFlow';
          document.getElementById('subtitle').textContent = 'Could not load tenant site.';
          document.getElementById('about').textContent = '';
          msg('Retry in a moment.');
        }
      }

      document.getElementById('enquiry').addEventListener('submit', async (e) => {
        e.preventDefault();
        const f = e.target;
        const fd = new FormData(f);
        const payload = {
          name: String(fd.get('name') || '').trim(),
          email: String(fd.get('email') || '').trim(),
          intent: String(fd.get('message') || '').trim(),
          meta: {
            region_focus: String(fd.get('region') || '').trim(),
            budget_usd: String(fd.get('budget') || '').trim(),
            host: window.location.host,
            page: '/',
          },
        };
        try {
          msg('Submitting…');
          const r = await fetch('/api/tenant/intake', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
          const j = await r.json().catch(() => ({}));
          if (!r.ok) throw new Error(j.error || 'intake_failed');
          f.reset();
          msg('Thank you. We will contact you shortly.');
        } catch {
          msg('Could not submit. Please try again.');
        }
      });

      load();
    </script>
  </body>
</html>

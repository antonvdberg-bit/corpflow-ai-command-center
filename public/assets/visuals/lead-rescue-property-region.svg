<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 400 540"
  preserveAspectRatio="xMidYMid meet"
  role="img"
  aria-hidden="true"
  font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
>
  <title>Mauritius - North and West service area</title>
  <desc>A simplified map of Mauritius drawn from the public outline of the island. The full coastline is shown in a thin charcoal hairline; the North and West coast (from the Le Morne peninsula in the south-west, up the West coast through Black River and Tamarin, around Port Louis, and along the North coast through Grand Baie to Cap Malheureux) is highlighted with a slightly heavier brushed-brass stroke. Five small markers and labels indicate Cap Malheureux, Grand Baie, Port Louis, Tamarin, and Le Morne. A small north arrow sits in the upper-right. The map is for service-area illustration only; it is not a navigation chart.</desc>

  <defs>
    <linearGradient id="lr-prop-region-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBF8F2"/>
      <stop offset="100%" stop-color="#F4ECDF"/>
    </linearGradient>
  </defs>

  <rect width="400" height="540" fill="url(#lr-prop-region-bg)"/>


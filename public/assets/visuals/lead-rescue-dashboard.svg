<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1200 760"
  preserveAspectRatio="xMidYMid meet"
  role="img"
  aria-hidden="true"
  font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
>
  <title>AI Lead Rescue daily operator view (representational mockup)</title>
  <desc>A representational mockup of the AI Lead Rescue daily operator view with a today summary, three new leads with masked initials and timestamps, a small follow-up board grouped by status, and a daily summary indicator. Numbers and entries are illustrative only.</desc>

  <defs>
    <linearGradient id="lr-dash-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f253c"/>
      <stop offset="100%" stop-color="#0a1c2f"/>
    </linearGradient>
    <linearGradient id="lr-dash-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.04)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.02)"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="760" rx="20" fill="url(#lr-dash-bg)"/>
  <rect x="0.5" y="0.5" width="1199" height="759" rx="19.5" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <g transform="translate(40, 36)">
    <text x="0" y="22" font-size="18" font-weight="800" fill="#eef6ff" letter-spacing="-0.01em">AI Lead Rescue | Today</text>
    <text x="0" y="46" font-size="12" font-weight="600" fill="#7dd3fc" letter-spacing="0.16em">DAILY OPERATOR VIEW | ILLUSTRATIVE</text>
  </g>
  <g transform="translate(1160, 56)" text-anchor="end">
    <circle cx="-152" cy="-12" r="4" fill="rgba(45,212,191,0.85)"/>
    <text x="-140" y="-7" font-size="12" fill="#c9d8e8">Daily summary sent | 08:00</text>
  </g>

  <line x1="40" y1="100" x2="1160" y2="100" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <g transform="translate(40, 132)">
    <rect width="340" height="120" rx="14" fill="url(#lr-dash-card)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="20" y="32" font-size="11" font-weight="700" fill="#7dd3fc" letter-spacing="0.16em">NEW LEADS | TODAY</text>
    <text x="20" y="78" font-size="44" font-weight="800" fill="#eef6ff" letter-spacing="-0.04em">3</text>
    <text x="80" y="80" font-size="13" fill="#aebfd1">since 08:00</text>
    <line x1="20" y1="98" x2="320" y2="98" stroke="rgba(255,255,255,0.06)"/>
    <text x="20" y="114" font-size="12" fill="#aebfd1">Source: Website form (2), WhatsApp (1)</text>
  </g>

  <g transform="translate(430, 132)">
    <rect width="340" height="120" rx="14" fill="url(#lr-dash-card)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="20" y="32" font-size="11" font-weight="700" fill="#7dd3fc" letter-spacing="0.16em">FOLLOW-UP DUE</text>
    <text x="20" y="78" font-size="44" font-weight="800" fill="#eef6ff" letter-spacing="-0.04em">1</text>
    <text x="80" y="80" font-size="13" fill="#aebfd1">over 24h without reply</text>
    <line x1="20" y1="98" x2="320" y2="98" stroke="rgba(255,255,255,0.06)"/>
    <text x="20" y="114" font-size="12" fill="#aebfd1">Owner alerted | awaiting reply</text>
  </g>

  <g transform="translate(820, 132)">
    <rect width="340" height="120" rx="14" fill="url(#lr-dash-card)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="20" y="32" font-size="11" font-weight="700" fill="#7dd3fc" letter-spacing="0.16em">REPLIED | LAST 7 DAYS</text>
    <text x="20" y="78" font-size="44" font-weight="800" fill="#eef6ff" letter-spacing="-0.04em">14</text>
    <text x="80" y="80" font-size="13" fill="#aebfd1">leads followed up</text>
    <line x1="20" y1="98" x2="320" y2="98" stroke="rgba(255,255,255,0.06)"/>
    <text x="20" y="114" font-size="12" fill="#aebfd1">No outcomes claimed | operator-logged</text>
  </g>

  <g transform="translate(40, 290)">
    <rect width="730" height="430" rx="16" fill="url(#lr-dash-card)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="22" y="34" font-size="14" font-weight="800" fill="#eef6ff">Today&apos;s leads</text>
    <text x="22" y="56" font-size="11" font-weight="600" fill="#aebfd1" letter-spacing="0.10em">INITIALS, TIMESTAMP, SOURCE, STATUS</text>

    <line x1="22" y1="76" x2="708" y2="76" stroke="rgba(255,255,255,0.06)"/>

    <g font-size="13" fill="#d6e4f2">
      <g transform="translate(22, 100)">
        <circle cx="14" cy="0" r="14" fill="rgba(45,212,191,0.10)" stroke="rgba(45,212,191,0.45)" stroke-width="1"/>
        <text x="14" y="4" text-anchor="middle" font-size="11" font-weight="700" fill="#eef6ff">A.R.</text>
        <text x="42" y="4" font-weight="700" fill="#eef6ff">A. R.</text>
        <text x="42" y="22" font-size="12" fill="#aebfd1">Website form | 09:14</text>
        <g transform="translate(560, -10)">
          <rect width="120" height="22" rx="11" fill="rgba(125, 211, 252, 0.10)" stroke="rgba(125, 211, 252, 0.40)"/>
          <text x="60" y="14" text-anchor="middle" font-size="11" font-weight="700" fill="#7dd3fc">NEW | OPEN</text>
        </g>
      </g>

      <line x1="22" y1="142" x2="708" y2="142" stroke="rgba(255,255,255,0.04)"/>

      <g transform="translate(22, 168)">
        <circle cx="14" cy="0" r="14" fill="rgba(45,212,191,0.10)" stroke="rgba(45,212,191,0.45)" stroke-width="1"/>
        <text x="14" y="4" text-anchor="middle" font-size="11" font-weight="700" fill="#eef6ff">M.J.</text>
        <text x="42" y="4" font-weight="700" fill="#eef6ff">M. J.</text>
        <text x="42" y="22" font-size="12" fill="#aebfd1">Website form | 10:42</text>
        <g transform="translate(560, -10)">
          <rect width="120" height="22" rx="11" fill="rgba(45, 212, 191, 0.10)" stroke="rgba(45, 212, 191, 0.45)"/>
          <text x="60" y="14" text-anchor="middle" font-size="11" font-weight="700" fill="#2dd4bf">REPLIED</text>
        </g>
      </g>

      <line x1="22" y1="210" x2="708" y2="210" stroke="rgba(255,255,255,0.04)"/>

      <g transform="translate(22, 236)">
        <circle cx="14" cy="0" r="14" fill="rgba(45,212,191,0.10)" stroke="rgba(45,212,191,0.45)" stroke-width="1"/>
        <text x="14" y="4" text-anchor="middle" font-size="11" font-weight="700" fill="#eef6ff">S.C.</text>
        <text x="42" y="4" font-weight="700" fill="#eef6ff">S. C.</text>
        <text x="42" y="22" font-size="12" fill="#aebfd1">WhatsApp | 11:08</text>
        <g transform="translate(560, -10)">
          <rect width="120" height="22" rx="11" fill="rgba(190, 158, 105, 0.12)" stroke="rgba(190, 158, 105, 0.45)"/>
          <text x="60" y="14" text-anchor="middle" font-size="11" font-weight="700" fill="#be9e69">FOLLOW-UP DUE</text>
        </g>
      </g>

      <line x1="22" y1="278" x2="708" y2="278" stroke="rgba(255,255,255,0.04)"/>

      <g transform="translate(22, 304)">
        <circle cx="14" cy="0" r="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
        <text x="14" y="4" text-anchor="middle" font-size="11" font-weight="700" fill="#9fb2c8">...</text>
        <text x="42" y="4" font-weight="700" fill="#9fb2c8">More leads in board</text>
        <text x="42" y="22" font-size="12" fill="#7c8da3">Open the follow-up board to view all</text>
      </g>
    </g>

    <text x="22" y="400" font-size="11" fill="#7c8da3">Names shown as initials only on this view.</text>
  </g>

  <g transform="translate(820, 290)">
    <rect width="340" height="200" rx="16" fill="url(#lr-dash-card)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="20" y="32" font-size="14" font-weight="800" fill="#eef6ff">Follow-up board</text>
    <text x="20" y="54" font-size="11" font-weight="600" fill="#aebfd1" letter-spacing="0.10em">GROUPED BY STATUS</text>

    <g transform="translate(20, 76)" font-size="13">
      <g>
        <circle cx="6" cy="6" r="4" fill="#7dd3fc"/>
        <text x="20" y="10" fill="#d6e4f2">Open</text>
        <text x="280" y="10" text-anchor="end" font-weight="700" fill="#eef6ff">2</text>
      </g>
      <g transform="translate(0, 32)">
        <circle cx="6" cy="6" r="4" fill="#2dd4bf"/>
        <text x="20" y="10" fill="#d6e4f2">Replied</text>
        <text x="280" y="10" text-anchor="end" font-weight="700" fill="#eef6ff">1</text>
      </g>
      <g transform="translate(0, 64)">
        <circle cx="6" cy="6" r="4" fill="#be9e69"/>
        <text x="20" y="10" fill="#d6e4f2">Follow-up due</text>
        <text x="280" y="10" text-anchor="end" font-weight="700" fill="#eef6ff">1</text>
      </g>
      <g transform="translate(0, 96)">
        <circle cx="6" cy="6" r="4" fill="rgba(255,255,255,0.18)"/>
        <text x="20" y="10" fill="#9fb2c8">Closed</text>
        <text x="280" y="10" text-anchor="end" font-weight="700" fill="#9fb2c8">7</text>
      </g>
    </g>
  </g>

  <g transform="translate(820, 520)">
    <rect width="340" height="200" rx="16" fill="url(#lr-dash-card)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text x="20" y="32" font-size="14" font-weight="800" fill="#eef6ff">Daily summary</text>
    <text x="20" y="54" font-size="11" font-weight="600" fill="#aebfd1" letter-spacing="0.10em">SENT EVERY MORNING</text>

    <g transform="translate(20, 78)" font-size="13" fill="#d6e4f2">
      <text y="10">3 new leads since yesterday</text>
      <text y="34">1 follow-up due (over 24h)</text>
      <text y="58">14 leads replied to (last 7 days)</text>
    </g>

    <g transform="translate(20, 158)">
      <rect width="300" height="32" rx="10" fill="rgba(45, 212, 191, 0.10)" stroke="rgba(45, 212, 191, 0.40)"/>
      <text x="150" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#2dd4bf">SENT TO OWNER | 08:00</text>
    </g>
  </g>
</svg>

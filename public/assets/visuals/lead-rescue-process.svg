<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1200 360"
  preserveAspectRatio="xMidYMid meet"
  role="img"
  aria-hidden="true"
>
  <title>AI Lead Rescue process flow</title>
  <desc>Three-stage flow: a new enquiry is captured from a connected source, the owner or operator is alerted, and the lead is logged on a follow-up board with a daily summary.</desc>

  <defs>
    <linearGradient id="lr-process-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1f33"/>
      <stop offset="100%" stop-color="#06111f"/>
    </linearGradient>
    <linearGradient id="lr-process-rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(190, 158, 105, 0.10)"/>
      <stop offset="50%" stop-color="rgba(190, 158, 105, 0.50)"/>
      <stop offset="100%" stop-color="rgba(190, 158, 105, 0.10)"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="360" fill="url(#lr-process-bg)"/>

  <line x1="160" y1="180" x2="1040" y2="180" stroke="url(#lr-process-rule)" stroke-width="1"/>

  <g fill="rgba(45, 212, 191, 0.55)">
    <circle cx="345" cy="180" r="1.6"/>
    <circle cx="425" cy="180" r="1.6"/>
    <circle cx="775" cy="180" r="1.6"/>
    <circle cx="855" cy="180" r="1.6"/>
  </g>

  <g>
    <circle cx="240" cy="180" r="60" fill="rgba(45, 212, 191, 0.05)" stroke="rgba(45, 212, 191, 0.45)" stroke-width="1.25"/>
    <g transform="translate(240, 180)" fill="none" stroke="rgba(190, 158, 105, 0.85)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
      <rect x="-22" y="-26" width="44" height="34" rx="3"/>
      <line x1="-14" y1="-16" x2="14" y2="-16"/>
      <line x1="-14" y1="-8" x2="6" y2="-8"/>
      <path d="M -22,8 L 0,18 L 22,8" />
    </g>
    <text x="240" y="280" text-anchor="middle" font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#7dd3fc" letter-spacing="2">CAPTURE</text>
    <text x="240" y="304" text-anchor="middle" font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#c9d8e8">Form, email, WhatsApp,</text>
    <text x="240" y="322" text-anchor="middle" font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#c9d8e8">or Google Form</text>
  </g>

  <g>
    <circle cx="600" cy="180" r="60" fill="rgba(45, 212, 191, 0.05)" stroke="rgba(45, 212, 191, 0.45)" stroke-width="1.25"/>
    <g transform="translate(600, 180)" fill="none" stroke="rgba(190, 158, 105, 0.85)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
      <path d="M -16,-12 C -16,-22 -8,-30 0,-30 C 8,-30 16,-22 16,-12 L 16,4 L 20,12 L -20,12 L -16,4 Z"/>
      <path d="M -6,18 C -6,22 -3,24 0,24 C 3,24 6,22 6,18"/>
    </g>
    <text x="600" y="280" text-anchor="middle" font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#7dd3fc" letter-spacing="2">ALERT</text>
    <text x="600" y="304" text-anchor="middle" font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#c9d8e8">Owner or operator notified</text>
    <text x="600" y="322" text-anchor="middle" font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#c9d8e8">within seconds</text>
  </g>

  <g>
    <circle cx="960" cy="180" r="60" fill="rgba(45, 212, 191, 0.05)" stroke="rgba(45, 212, 191, 0.45)" stroke-width="1.25"/>
    <g transform="translate(960, 180)" fill="none" stroke="rgba(190, 158, 105, 0.85)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
      <rect x="-22" y="-22" width="44" height="44" rx="3"/>
      <line x1="-14" y1="-10" x2="14" y2="-10"/>
      <line x1="-14" y1="0" x2="14" y2="0"/>
      <line x1="-14" y1="10" x2="6" y2="10"/>
    </g>
    <text x="960" y="280" text-anchor="middle" font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#7dd3fc" letter-spacing="2">LOG &amp; SUMMARISE</text>
    <text x="960" y="304" text-anchor="middle" font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#c9d8e8">Follow-up board</text>
    <text x="960" y="322" text-anchor="middle" font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#c9d8e8">+ daily summary</text>
  </g>
</svg>

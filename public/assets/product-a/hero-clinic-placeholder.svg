<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Warm, calm premium treatment-room placeholder with soft amber light">
  <defs>
    <linearGradient id="room" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0" stop-color="#241a12"/>
      <stop offset="0.5" stop-color="#2c1f15"/>
      <stop offset="1" stop-color="#160f0a"/>
    </linearGradient>
    <radialGradient id="window" cx="0.78" cy="0.24" r="0.6">
      <stop offset="0" stop-color="#e8c489" stop-opacity="0.82"/>
      <stop offset="0.45" stop-color="#c79a5e" stop-opacity="0.40"/>
      <stop offset="1" stop-color="#c79a5e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="warmFill" cx="0.30" cy="0.62" r="0.6">
      <stop offset="0" stop-color="#9c6f43" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#9c6f43" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blush" cx="0.52" cy="0.18" r="0.5">
      <stop offset="0" stop-color="#e7b4a0" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#e7b4a0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lightBand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f3dcb4" stop-opacity="0"/>
      <stop offset="0.4" stop-color="#f3dcb4" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#f3dcb4" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="vignette" cx="0.5" cy="0.46" r="0.75">
      <stop offset="0.55" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#0d0805" stop-opacity="0.62"/>
    </radialGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1d140d" stop-opacity="0"/>
      <stop offset="1" stop-color="#0f0a07" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <!-- warm room base -->
  <rect width="1600" height="1000" fill="url(#room)"/>

  <!-- soft architectural light bands (suggesting tall windows / linen drapes) -->
  <g opacity="0.8">
    <rect x="1040" y="-40" width="150" height="1080" fill="url(#lightBand)"/>
    <rect x="1230" y="-40" width="120" height="1080" fill="url(#lightBand)" opacity="0.7"/>
    <rect x="1400" y="-40" width="110" height="1080" fill="url(#lightBand)" opacity="0.55"/>
  </g>

  <!-- primary warm light source (calm, luxurious, not clinical) -->
  <ellipse cx="1250" cy="240" rx="720" ry="600" fill="url(#window)"/>
  <ellipse cx="470" cy="640" rx="720" ry="560" fill="url(#warmFill)"/>
  <ellipse cx="830" cy="150" rx="640" ry="420" fill="url(#blush)"/>

  <!-- soft low-contrast forms suggesting a serene treatment space -->
  <g opacity="0.5">
    <rect x="120" y="560" width="560" height="300" rx="46" fill="#3a2a1c"/>
    <rect x="150" y="585" width="500" height="40" rx="20" fill="#5a4128" opacity="0.7"/>
    <ellipse cx="1300" cy="720" rx="280" ry="150" fill="#2a1d13"/>
  </g>

  <!-- a hint of botanical calm in the corner -->
  <g opacity="0.32" fill="#1c2716">
    <ellipse cx="90" cy="220" rx="120" ry="220" transform="rotate(-18 90 220)"/>
    <ellipse cx="180" cy="170" rx="90" ry="180" transform="rotate(8 180 170)"/>
  </g>

  <!-- grounding floor + cinematic vignette -->
  <rect x="0" y="640" width="1600" height="360" fill="url(#floor)"/>
  <rect width="1600" height="1000" fill="url(#vignette)"/>
</svg>

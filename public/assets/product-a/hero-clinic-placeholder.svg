<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Calm luxury treatment-room placeholder in warm stone and blush tones">
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="0.35" y2="1">
      <stop offset="0" stop-color="#f3e9df"/>
      <stop offset="0.45" stop-color="#e7d3c4"/>
      <stop offset="1" stop-color="#caa896"/>
    </linearGradient>
    <radialGradient id="glowWarm" cx="0.28" cy="0.30" r="0.55">
      <stop offset="0" stop-color="#fff6ec" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#fff6ec" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBlush" cx="0.80" cy="0.22" r="0.5">
      <stop offset="0" stop-color="#e9c6bd" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#e9c6bd" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="depth" cx="0.5" cy="1.05" r="0.9">
      <stop offset="0" stop-color="#3a2a26" stop-opacity="0.40"/>
      <stop offset="1" stop-color="#3a2a26" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="0.2">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="1000" fill="url(#base)"/>

  <!-- soft calm forms suggesting a serene, uncluttered treatment space -->
  <ellipse cx="470" cy="360" rx="900" ry="640" fill="url(#glowWarm)"/>
  <ellipse cx="1280" cy="240" rx="620" ry="520" fill="url(#glowBlush)"/>

  <g opacity="0.55">
    <path d="M0 720 C 380 640 720 700 1120 600 C 1360 540 1520 560 1600 540 L 1600 1000 L 0 1000 Z" fill="#b98c77" opacity="0.35"/>
    <path d="M0 820 C 420 770 860 820 1260 740 C 1430 705 1540 720 1600 705 L 1600 1000 L 0 1000 Z" fill="#9c6f5c" opacity="0.40"/>
  </g>

  <!-- subtle vertical sheen evoking a quiet, refined interior -->
  <rect x="980" y="0" width="240" height="1000" fill="url(#sheen)"/>
  <rect x="300" y="0" width="160" height="1000" fill="url(#sheen)" opacity="0.6"/>

  <rect width="1600" height="1000" fill="url(#depth)"/>
</svg>

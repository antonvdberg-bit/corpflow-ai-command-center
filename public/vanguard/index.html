<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VANGUARD | Sovereign Vault & Insurance Policy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .badge { font-size: 8px; font-weight: 900; padding: 2px 6px; border-radius: 2px; text-transform: uppercase; }
        .badge-corrected { background: #064e3b; color: #34d399; border: 1px solid #059669; }
        .badge-parked { background: #1e3a8a; color: #93c5fd; border: 1px solid #2563eb; }
        .badge-rejected { background: #450a0a; color: #f87171; border: 1px solid #b91c1c; }
        .badge-executing { background: #451a03; color: #fbbf24; border: 1px solid #d97706; }
        .badge-deployed { background: #022c22; color: #10b981; border: 1px solid #059669; }
        .nav-active { border-left: 4px solid #3b82f6; background: #111; color: white; }
        details > summary { list-style: none; cursor: pointer; }
        details > summary::-webkit-details-marker { display: none; }
    </style>
</head>
<body class="bg-[#020202] text-zinc-500 font-mono text-[10px] h-screen flex overflow-hidden">
    <aside class="w-80 border-r border-zinc-900 bg-black flex flex-col">
        <div class="p-10 border-b border-zinc-900 bg-zinc-950/20">
            <h1 class="text-white font-black text-xl italic uppercase">Vanguard_Vault</h1>
            <p class="text-[8px] text-zinc-700 mt-1 uppercase tracking-widest">Project DNA & Insurance Policy</p>
        </div>
        <nav id="nav" class="flex-1 p-6 space-y-2 overflow-y-auto"></nav>
    </aside>

    <main class="flex-1 flex flex-col bg-[#050505] overflow-auto">
        <header class="h-24 border-b border-zinc-900 flex items-center justify-between px-12 bg-black/80 sticky top-0 z-50">
            <div>
                <h2 id="view_title" class="text-white text-lg font-bold uppercase tracking-widest">Select Node</h2>
                <p id="view_meta" class="text-[8px] text-zinc-700 mt-1 uppercase"></p>
            </div>
            <div class="text-right">
                <p class="text-[9px] font-bold text-emerald-500">SYSTEM_RECONSTRUCTION_READY: TRUE</p>
                <p class="text-[7px] text-zinc-800">VAULT_VER: 11.0.2026</p>
            </div>
        </header>

        <div id="vault_content" class="p-12 space-y-8">
            </div>
    </main>

    <script>
        const vault = {
            "node_corp": {
                "name": "CorpFlowAI",
                "meta": "Core Business Systems & Brand Standards",
                "data": [
                    {
                        "id": "CF-001",
                        "area": "Main Landing Page Re-evaluation",
                        "dates": {"start": "2026-03-22", "update": "2026-03-23"},
                        "config": "Standard: Sam Crawford High-Fidelity; Framework: Next.js/Tailwind",
                        "discussion": "Shifted from generic marketing to 'Demi-God' onboarding ritual. User insisted on retesting until conformance is absolute.",
                        "status": ["executing"],
                        "decision_log": "Rejected 'Standard' template in favor of forensic transparency UI."
                    },
                    {
                        "id": "CF-002",
                        "area": "Top 5 Client Management Processes",
                        "dates": {"start": "2026-03-23", "target": "2026-03-30"},
                        "config": "Phase 1: Attract; Phase 2: Prime; Phase 3: Sell; Phase 4: Onboard; Phase 5: Retain.",
                        "discussion": "Defined as the core operational engine for high-value client lifecycle.",
                        "status": ["executing"],
                        "decision_log": "Prioritized 'Retain' forensic logging to justify $375k+ investment tiers."
                    }
                ]
            },
            "node_luxe": {
                "name": "Luxe Maurice",
                "meta": "HNW Concierge & Real Estate Enclave",
                "data": [
                    {
                        "id": "LX-101",
                        "area": "HNW Lead Qualifier",
                        "dates": {"start": "2026-03-15", "update": "2026-03-23"},
                        "config": "Budget Threshold: >$375,000 USD; Legal: Mauritius Art. 11 compliance.",
                        "discussion": "Crucial requirement to filter out non-serious leads. User provided specific budget and residency intent triggers.",
                        "status": ["executing", "rejected"],
                        "decision_log": "Rejected standard KYC. Path taken: Forensic Audit Layer for SA Exchange Control."
                    },
                    {
                        "id": "LX-102",
                        "area": "GHL Solutions / SA Focus",
                        "dates": {"start": "2026-03-20", "update": "2026-03-23"},
                        "config": "Focus: South African source of wealth verification; Mauritian FIU compliance.",
                        "discussion": "Discussion focused on the difficulty of SA capital flight and the need for legal air-gapping.",
                        "status": ["pending"],
                        "decision_log": "Parked until the Legal Partners SCJ mapping is finalized."
                    },
                    {
                        "id": "LX-103",
                        "area": "Bain Boeuf Private Collection",
                        "dates": {"start": "2026-03-10", "deployed": "2026-03-20"},
                        "config": "Status: Stealth Page; Protocol: Private URL only.",
                        "discussion": "User requested 'Hidden' showcase to maintain exclusivity for HNWIs.",
                        "status": ["deployed"],
                        "decision_log": "Confirmed deployment of stealth architecture."
                    }
                ]
            },
            "node_aura": {
                "name": "Aura Wellness",
                "meta": "Regenerative Aesthetics & Clinical Excellence",
                "data": [
                    {
                        "id": "AU-201",
                        "area": "Clinical Excellence Headline",
                        "dates": {"start": "2026-03-23", "target": "2026-03-25"},
                        "config": "Copy: 'The Mauritius Standard for Clinical Excellence'; Source: AI Scrape.",
                        "discussion": "Aimed at establishing Mauritius as a global hub for barrier-first aesthetic treatments.",
                        "status": ["pending"],
                        "decision_log": "Rejected generic wellness hooks for 2026 'Skin-Barrier First' clinical messaging."
                    },
                    {
                        "id": "AU-202",
                        "area": "Aurora Funnel / Separated Identity",
                        "dates": {"start": "2026-03-22", "update": "2026-03-23"},
                        "config": "Standard: Sam Crawford; Attribution: 'Powered by CorpFlowAI'.",
                        "discussion": "Funnel must be completely separate from main CorpFlow brand to maintain niche authority.",
                        "status": ["executing"],
                        "decision_log": "Agreed on 'Shadow-Parent' relationship between Aura and CorpFlowAI."
                    }
                ]
            },
            "node_core": {
                "name": "Vanguard_Core",
                "meta": "Infrastructure Governance & Decision Registry",
                "data": [
                    {
                        "id": "VC-001",
                        "area": "Global Tech Stack Lock",
                        "dates": {"start": "2026-03-22", "lock": "2026-03-23"},
                        "config": "Video: HeyGen; Audio: ElevenLabs; Storage: Nitro Enclave.",
                        "discussion": "Decision made to standardize on HeyGen/ElevenLabs for all client avatars. User purged Sam Crawford name from registry.",
                        "status": ["corrected", "deployed"],
                        "decision_log": "CORRECTION: Removed Senior_Clerk from Core. REJECTION: Synthesia (API limits)."
                    }
                ]
            }
        };

        function switchNode(key) {
            const node = vault[key];
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('nav-active'));
            document.getElementById('btn_'+key).classList.add('nav-active');
            document.getElementById('view_title').innerText = node.name + " // BLACK_BOX_RECORD";
            document.getElementById('view_meta').innerText = node.meta;

            document.getElementById('vault_content').innerHTML = node.data.map(d => `
                <div class="border border-zinc-900 bg-black rounded p-8 hover:border-zinc-700 transition-all">
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <p class="text-blue-500 font-bold tracking-widest text-[8px] mb-1">TX_ID: ${d.id}</p>
                            <h3 class="text-white text-lg font-bold italic uppercase tracking-tighter">${d.area}</h3>
                        </div>
                        <div class="flex gap-2">
                            ${d.status.map(s => `<span class="badge badge-${s}">${s}</span>`).join('')}
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-8 text-[9px] mb-8">
                        <div class="space-y-2">
                            <p class="text-zinc-700 font-bold uppercase tracking-widest">Temporal Markers</p>
                            ${Object.entries(d.dates).map(([label, date]) => `<p><span class="text-zinc-500 uppercase">${label}:</span> <span class="text-zinc-300 font-bold">${date}</span></p>`).join('')}
                        </div>
                        <div class="space-y-2">
                            <p class="text-zinc-700 font-bold uppercase tracking-widest">Config Parameters</p>
                            <p class="text-zinc-300 leading-relaxed">${d.config}</p>
                        </div>
                        <div class="space-y-2">
                            <p class="text-zinc-700 font-bold uppercase tracking-widest">Decision Path</p>
                            <p class="text-amber-600 italic font-bold leading-relaxed">${d.decision_log}</p>
                        </div>
                    </div>

                    <details class="group">
                        <summary class="text-zinc-600 hover:text-white transition-colors uppercase font-bold tracking-[0.2em] text-[8px] flex items-center">
                            <span class="mr-2">▶</span> Discussion Archive & Reconstruction Context
                        </summary>
                        <div class="mt-4 p-6 bg-zinc-950/50 border-l-2 border-zinc-800 text-zinc-400 text-[10px] leading-relaxed italic">
                            "${d.discussion}"
                        </div>
                    </details>
                </div>
            `).join('');
        }

        const nav = document.getElementById('nav');
        nav.innerHTML = Object.keys(vault).map(k => `
            <button onclick="switchNode('${k}')" id="btn_${k}" class="w-full text-left p-5 border border-zinc-900 rounded hover:border-zinc-700 transition-all">
                <p class="font-bold text-zinc-300 text-[11px] mb-1">${vault[k].name}</p>
                <p class="text-[7px] text-zinc-700 uppercase tracking-widest">ID: ${k.toUpperCase()}</p>
            </button>
        `).join('');

        switchNode('node_corp');
    </script>
</body>
</html>

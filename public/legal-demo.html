<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Legal Enclave | Mauritius 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background: #0a0a0a; color: #d4d4d8; font-family: 'Courier New', Courier, monospace; }</style>
</head>
<body class="p-8">
    <div class="max-w-3xl mx-auto border border-zinc-800 bg-zinc-950 p-6 shadow-2xl">
        <h1 class="text-xl font-bold text-white mb-2 underline">LEGAL_ENCLAVE_v1.0</h1>
        <p class="text-xs text-zinc-500 mb-6 uppercase">Jurisdiction: Mauritius (SCJ) | System Status: Active</p>
        
        <input id="q" type="text" placeholder="SEARCH PRECEDENTS (e.g. TAX, MRA, AML)" 
               class="w-full bg-black border border-zinc-800 p-3 text-green-500 mb-4 focus:outline-none focus:border-green-600">
        
        <button onclick="search()" class="w-full border border-zinc-700 bg-zinc-900 py-3 font-bold hover:bg-white hover:text-black transition-all">
            QUERY SCJ ARCHIVE
        </button>

        <div id="results" class="mt-8 space-y-4"></div>
    </div>

    <script>
        async function search() {
            const q = document.getElementById('q').value;
            const resDiv = document.getElementById('results');
            resDiv.innerHTML = "<p class='animate-pulse text-green-500'>PENETRATING SUPREME COURT ARCHIVE...</p>";
            
            try {
                // Using a relative path to survive the GitHub Tunnel
                const response = await fetch(`api/legal-search?query=${q}`);
                const data = await response.json();
                
                if (!data || data.length === 0) {
                    resDiv.innerHTML = "<p class='text-zinc-500 italic'>NO MATCHING PRECEDENTS IN CURRENT CACHE.</p>";
                    return;
                }

                resDiv.innerHTML = data.map(item => `
                    <div class="border-l-2 border-green-700 pl-4 py-3 bg-zinc-900/40 hover:bg-zinc-900/60 transition-colors">
                        <p class="text-green-500 text-sm font-bold">[${item.id}] ${item.title}</p>
                        <p class="text-xs text-zinc-300 font-semibold mb-1">${item.area}</p>
                        <p class="text-xs text-zinc-400 italic">${item.summary}</p>
                    </div>
                `).join('');
            } catch (e) {
                console.error("SEARCH_FAILED:", e);
                resDiv.innerHTML = "<p class='text-red-500 font-bold underline'>TUNNEL_ERROR: VERIFY PORT 3000 IS PUBLIC</p>";
            }
        }
    </script>
    <script src="/assets/cmp/bubble.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>CorpFlowAI | Mauritius</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #f8fafc; font-family: sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .logo-scale { height: 120px; width: auto; transform: scale(1.8); transform-origin: left; transition: all 0.3s ease; }
    </style>
<script src="/assets/logos/theme.js"></script>
</head>
<body class="bg-[#020617]">
    <nav class="p-12 flex justify-between items-center max-w-7xl mx-auto">
        <a href="/"><img src="/assets/logos/LogoSQBK.png" alt="CorpFlowAI" class="logo-scale"></a>
        <div class="hidden md:flex space-x-8 text-[10px] uppercase tracking-widest font-bold text-slate-500">
            <a href="/proposal-medspa.html" class="hover:text-blue-500 transition">View Proposal</a>
            <a href="/upload.html" class="hover:text-blue-500 transition">Asset Portal</a>
        </div>
    </nav>
    <main class="max-w-7xl mx-auto px-6 pt-32 text-center">
        <h1 class="text-7xl font-bold tracking-tighter mb-6">Scale <span class="italic text-blue-500">Instantly.</span></h1>
        <p class="text-slate-400 text-xl mb-12">Bespoke autonomous systems for elite service firms.</p>
        <section class="glass max-w-4xl mx-auto rounded-[40px] overflow-hidden grid grid-cols-1 md:grid-cols-2 text-left">
            <div class="p-12 bg-slate-900/50">
                <h2 class="text-3xl font-bold mb-4">Serenity Concierge</h2>
                <p class="text-slate-400 text-sm">Experience our production-grade agent trained for high-end wellness protocols.</p>
            </div>
            <div class="p-12 flex flex-col h-[400px]">
                <div id="chat-output" class="flex-1 overflow-y-auto space-y-4 text-sm mb-4"></div>
                <input id="user-input" type="text" placeholder="Type here..." class="w-full bg-slate-800 p-4 rounded-xl text-white outline-none">
            </div>
        </section>
    </main>
    <script>
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const output = document.getElementById('chat-output');
            const msg = input.value; if(!msg) return;
            output.innerHTML += `<div class="text-right text-slate-500 mb-2">${msg}</div>`;
            input.value = '';
            const res = await fetch(`/api/chat?message=${encodeURIComponent(msg)}`);
            const data = await res.json();
            output.innerHTML += `<div class="text-blue-300 mb-4">${data.response}</div>`;
            output.scrollTop = output.scrollHeight;
        }
        document.getElementById('user-input').addEventListener('keypress', (e) => e.key === 'Enter' && sendMessage());
    </script>
</body>
</html>

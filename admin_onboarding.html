<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>CorpFlowAI | Client Provisioning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background: #0f172a; color: white; }</style>
</head>
<body class="p-12">
    <div class="max-w-2xl mx-auto bg-slate-900 p-8 rounded-3xl border border-slate-800">
        <h1 class="text-2xl font-bold mb-6">Provision New AI Tenant</h1>
        <form class="space-y-4">
            <div>
                <label class="block text-sm text-slate-400 mb-1">Business Name</label>
                <input type="text" class="w-full bg-slate-800 border-none rounded-xl p-3" placeholder="e.g. Royal Clinic Mauritius">
            </div>
            <div>
                <label class="block text-sm text-slate-400 mb-1">Owner WhatsApp (International Format)</label>
                <input type="text" class="w-full bg-slate-800 border-none rounded-xl p-3" placeholder="+230...">
            </div>
            <div>
                <label class="block text-sm text-slate-400 mb-1">Core Knowledge (Paste Brochure/Text)</label>
                <textarea class="w-full bg-slate-800 border-none rounded-xl p-3 h-32" placeholder="Paste services, pricing, and clinic hours here..."></textarea>
            </div>
            <button type="button" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-bold">
                GENERATE AUTONOMOUS AGENT
            </button>
        </form>
    </div>
</body>
</html>

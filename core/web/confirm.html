<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Booking Confirmed | Serenity Wellness</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background: #0f172a; color: white; }</style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">
    <div class="max-w-md w-full bg-slate-900 border border-slate-800 rounded-3xl p-8 text-center shadow-2xl">
        <div class="w-20 h-20 bg-blue-600/20 text-blue-500 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
            </svg>
        </div>
        <h1 class="text-3xl font-bold mb-2">You're All Set!</h1>
        <p class="text-slate-400 mb-8">Your appointment has been synced with our specialist's calendar.</p>
        
        <div class="bg-slate-950 rounded-2xl p-4 mb-8 border border-slate-800 text-left">
            <p class="text-xs text-blue-400 uppercase font-bold mb-1">Treatment</p>
            <p class="text-lg font-medium mb-4" id="display-service">Medical Consultation</p>
            <p class="text-xs text-blue-400 uppercase font-bold mb-1">Next Steps</p>
            <ul class="text-sm text-slate-400 space-y-2">
                <li>• Arrive 10 mins early</li>
                <li>• Avoid sun exposure 24h prior</li>
                <li>• Bring your ID for registration</li>
            </ul>
        </div>

        <a href="/" class="block w-full bg-slate-800 hover:bg-slate-700 text-white font-bold py-3 rounded-xl transition">
            Back to Home
        </a>
    </div>
</body>
</html>

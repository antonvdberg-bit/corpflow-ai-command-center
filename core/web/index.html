<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CorpflowAI | Audit Gate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #ffffff; font-family: sans-serif; }
        .accent { color: #FF5733; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 50; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center">
    <button onclick="openAudit()" class="border border-[#FF5733] px-12 py-6 text-sm font-bold uppercase tracking-[0.4em] hover:bg-[#FF5733] transition-all">
        [ Start Architecture Stress Test ]
    </button>

    <div id="auditModal" class="modal flex-col items-center justify-center p-6">
        <div class="max-w-md w-full border border-white/10 p-8 bg-black">
            <h2 class="text-2xl font-bold mb-4 uppercase tracking-tighter">System Audit</h2>
            <input id="leadEmail" type="email" placeholder="Corporate Email" class="w-full bg-white/5 border border-white/10 p-4 mb-4 text-white">
            <button onclick="submitAudit()" class="w-full bg-[#FF5733] py-4 font-bold uppercase">Execute Gap Analysis</button>
            <button onclick="closeAudit()" class="w-full py-4 text-xs text-gray-500 uppercase">Cancel</button>
        </div>
    </div>

    <script>
        function openAudit() { document.getElementById('auditModal').style.display = 'flex'; }
        function closeAudit() { document.getElementById('auditModal').style.display = 'none'; }
        async function submitAudit() {
            const email = document.getElementById('leadEmail').value;
            alert('Audit Initialized for: ' + email + '. Connecting to Database...');
            // Connection logic will trigger here
            closeAudit();
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>CorpFlowAI | Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; }
        .chat-box { height: 400px; overflow-y: auto; scrollbar-width: thin; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="w-full max-w-md bg-slate-900 rounded-3xl shadow-2xl border border-slate-800 p-6">
        <div class="flex items-center gap-3 mb-6">
            <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
            <h2 class="text-xl font-bold">Serenity Spa Concierge</h2>
        </div>
        
        <div id="chat-output" class="chat-box space-y-4 mb-4 text-sm p-2">
            <div class="text-blue-400">Welcome to Serenity. How can I assist you today?</div>
        </div>

        <div class="flex gap-2">
            <input id="user-input" type="text" class="flex-1 bg-slate-800 border-none rounded-xl p-3 text-white focus:ring-2 focus:ring-blue-500" placeholder="Ask about Botox or Hydrafacials...">
            <button onclick="sendMessage()" class="bg-blue-600 p-3 rounded-xl hover:bg-blue-500 transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                </svg>
            </button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const output = document.getElementById('chat-output');
            const msg = input.value;
            if(!msg) return;

            output.innerHTML += \`<div class="text-right text-slate-400 italic">You: \${msg}</div>\`;
            input.value = '';

            const res = await fetch(\`/api/chat?tenant_id=showroom_test&message=\${encodeURIComponent(msg)}\`);
            const data = await res.json();
            
            output.innerHTML += \`<div class="text-blue-300"><b>AI:</b> \${data.response}</div>\`;
            output.scrollTop = output.scrollHeight;
        }
    </script>
</body>
</html>

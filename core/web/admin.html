<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>CorpflowAI | Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #ffffff; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="p-8 md:p-20">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-end mb-12 border-b border-white/10 pb-8">
            <div>
                <h1 class="text-xs tracking-[0.6em] text-gray-500 uppercase mb-2">System Operations</h1>
                <div class="text-4xl font-black uppercase tracking-tighter">Command_Center.log</div>
            </div>
            <button onclick="loadData()" class="text-[10px] border border-white/20 px-6 py-2 hover:bg-white hover:text-black transition-all font-bold uppercase tracking-widest">Refresh Intel</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-16">
            <div class="glass p-10">
                <div class="text-[10px] text-gray-500 uppercase tracking-widest mb-4">Total Leads Captured</div>
                <div id="totalLeads" class="text-6xl font-black">--</div>
            </div>
            <div class="glass p-10">
                <div class="text-[10px] text-[#FF5733] uppercase tracking-widest mb-4">Gross Portfolio Leakage</div>
                <div id="totalLeak" class="text-6xl font-black text-[#FF5733]">--</div>
            </div>
        </div>
        
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="text-[10px] text-gray-500 uppercase tracking-[0.3em] border-b border-white/10">
                        <th class="pb-4 font-normal">Timestamp</th>
                        <th class="pb-4 font-normal">Enclave Email</th>
                        <th class="pb-4 font-normal text-right">Leakage Value</th>
                    </tr>
                </thead>
                <tbody id="leadTableBody" class="text-sm">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                const res = await fetch('/api/admin-leads');
                const data = await res.json();
                
                document.getElementById('totalLeads').innerText = data.stats.count;
                document.getElementById('totalLeak').innerText = '$' + data.stats.totalLeak.toLocaleString();
                
                const tableBody = document.getElementById('leadTableBody');
                tableBody.innerHTML = data.leads.map(lead => `
                    <tr class="border-b border-white/5 hover:bg-white/5 transition-colors">
                        <td class="py-6 text-gray-500 font-mono">${new Date(lead.createdAt).toLocaleDateString()}</td>
                        <td class="py-6 font-bold uppercase tracking-widest">${lead.email}</td>
                        <td class="py-6 text-right text-[#FF5733] font-black tracking-tight">$${(lead.gapScore || 0).toLocaleString()}</td>
                    </tr>
                `).join('');
            } catch (e) {
                console.error("Dashboard Sync Failed");
            }
        }
        loadData();
    </script>
</body>
</html>

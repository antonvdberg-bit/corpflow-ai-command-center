<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Disclosure card</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #0a0a0a;
        color: #ffffff;
        font-family: "DejaVu Sans", "Helvetica Neue", Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .card {
        box-sizing: border-box;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 48px;
        text-align: center;
      }
      .brand {
        font-size: 18px;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: #9ca3af;
        margin-bottom: 32px;
      }
      .lines {
        display: flex;
        flex-direction: column;
        gap: 16px;
        font-size: 26px;
        line-height: 1.4;
        max-width: 90%;
      }
      .lines .small {
        font-size: 18px;
        color: #cbd5e1;
      }
    </style>
  </head>
  <body>
    <div class="card" id="disclosure-card">
      <div class="brand">CorpFlow AI</div>
      <div class="lines">
        <div data-disclosure-line="0">Representational example only</div>
        <div class="small" data-disclosure-line="1">No real client data, no real Telegram resources</div>
        <div class="small" data-disclosure-line="2">Visual generated and assisted by AI tooling, reviewed by humans</div>
      </div>
    </div>
  </body>
</html>

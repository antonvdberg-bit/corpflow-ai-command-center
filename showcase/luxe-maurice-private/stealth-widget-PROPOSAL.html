<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxe Maurice | Strategic Intelligence Proposal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600&display=swap');
        body { background-color: #050505; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: 'Inter', sans-serif; }
        .stealth-widget { background: #0f0f0f; color: #fff; padding: 40px; border-radius: 2px; max-width: 420px; width: 90%; border: 1px solid #1a1a1a; box-shadow: 0 40px 100px rgba(0,0,0,1); }
        .timer-container { margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #1a1a1a; text-align: center; }
        .timer-label { font-size: 9px; letter-spacing: 3px; color: #888; text-transform: uppercase; margin-bottom: 12px; }
        .timer-digits { display: flex; justify-content: center; gap: 15px; font-weight: 200; color: #c4a46a; font-size: 20px; }
        .timer-unit { display: flex; flex-direction: column; align-items: center; }
        .timer-sub { font-size: 8px; color: #666; margin-top: 4px; letter-spacing: 1px; font-weight: 600; }
        h2 { font-size: 16px; font-weight: 400; margin-bottom: 10px; letter-spacing: 4px; text-transform: uppercase; color: #fff; }
        .description { color: #999; font-size: 12px; line-height: 1.6; margin-bottom: 35px; }
        .highlight { color: #c4a46a; font-weight: 600; }
        label { display: block; font-size: 10px; color: #aaa; margin-bottom: 12px; letter-spacing: 2px; text-transform: uppercase; font-weight: 600; }
        .input-wrapper { border-bottom: 1px solid #333; display: flex; align-items: center; padding-bottom: 8px; }
        .currency { color: #c4a46a; font-size: 22px; margin-right: 12px; font-weight: 200; }
        input { background: none; border: none; color: #fff; font-size: 28px; width: 100%; outline: none; font-weight: 200; }
        .audit-button { background: #c4a46a; color: #000; border: none; width: 100%; padding: 20px; font-weight: 600; cursor: pointer; letter-spacing: 3px; text-transform: uppercase; transition: 0.4s; width: 100%; }
        #results { display: none; margin-top: 35px; animation: slideUp 0.6s ease forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .result-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 13px; }
        .result-label { color: #888; }
        .result-value { color: #fff; font-family: monospace; }
        .savings-row { background: #161616; padding: 20px; margin-top: 25px; border-left: 3px solid #c4a46a; margin-bottom: 25px; }
        .savings-label { color: #c4a46a; font-weight: 600; font-size: 10px; letter-spacing: 2px; }
        .savings-value { color: #fff; font-size: 26px; font-weight: 200; margin-top: 8px; }
        .contact-button { display: block; text-align: center; text-decoration: none; background: transparent; border: 1px solid #c4a46a; color: #c4a46a; padding: 15px; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; font-weight: 600; transition: 0.3s; }
        .contact-button:hover { background: #c4a46a; color: #000; }
        .close-btn { background: none; border: none; color: #555; margin-top: 30px; cursor: pointer; font-size: 10px; width: 100%; letter-spacing: 2px; text-transform: uppercase; }
    </style>
</head>
<body>
<div class="stealth-widget">
    <div class="timer-container">
        <div class="timer-label">Policy Escalation Countdown</div>
        <div id="countdown" class="timer-digits">
            <div class="timer-unit"><span id="days">00</span><span class="timer-sub">DAYS</span></div>
            <div class="timer-unit"><span id="hours">00</span><span class="timer-sub">HRS</span></div>
            <div class="timer-unit"><span id="mins">00</span><span class="timer-sub">MIN</span></div>
            <div class="timer-unit"><span id="secs">00</span><span class="timer-sub">SEC</span></div>
        </div>
    </div>
    <h2>Luxe Maurice</h2>
    <p class="description">Calculate capital exposure prior to the <span class="highlight">July 1st</span> Duty escalation.</p>
    <div class="input-group">
        <label>Proposed Investment (USD)</label>
        <div class="input-wrapper"><span class="currency">$</span><input type="text" id="investment" placeholder="2,500,000" oninput="formatCurrency(this)"></div>
    </div>
    <button class="audit-button" onclick="runAudit()">Execute Audit</button>
    <div id="results">
        <div class="result-row"><span class="result-label">Current Duty (5%)</span><span class="result-value" id="current-val">$0</span></div>
        <div class="result-row"><span class="result-label">Post-July Duty (10%)</span><span class="result-value" id="new-val">$0</span></div>
        <div class="savings-row">
            <div class="savings-label">CAPITAL PRESERVATION GAIN</div>
            <div class="savings-value" id="exposure-val">$0</div>
        </div>
        <a href="https://luxemaurice.com/" id="lead-link" class="contact-button">Request Preservation Strategy</a>
    </div>
    <button class="close-btn" onclick="location.reload()">Terminate Session</button>
</div>
<script>
const targetDate = new Date("July 1, 2026 00:00:00").getTime();
function updateTimer() {
    const now = new Date().getTime();
    const distance = targetDate - now;
    document.getElementById("days").innerText = Math.floor(distance / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
    document.getElementById("hours").innerText = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
    document.getElementById("mins").innerText = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
    document.getElementById("secs").innerText = Math.floor((distance % (1000 * 60)) / 1000).toString().padStart(2, '0');
}
setInterval(updateTimer, 1000);
updateTimer();
function formatCurrency(input) {
    let value = input.value.replace(/\D/g, "");
    if (value) { input.value = Number(value).toLocaleString(); }
}
function runAudit() {
    const rawValue = document.getElementById('investment').value.replace(/,/g, '');
    if (!rawValue || rawValue <= 0) return;
    const currentDuty = rawValue * 0.05;
    const newDuty = rawValue * 0.10;
    document.getElementById('current-val').innerText = '$' + currentDuty.toLocaleString();
    document.getElementById('new-val').innerText = '$' + newDuty.toLocaleString();
    document.getElementById('exposure-val').innerText = '$' + (newDuty - currentDuty).toLocaleString();
    document.getElementById('lead-link').href = "https://luxemaurice.com/?investment=" + rawValue;
    document.getElementById('results').style.display = 'block';
}
</script>
</body>
</html>

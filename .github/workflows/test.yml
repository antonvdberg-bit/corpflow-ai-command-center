name: Agent CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    # GitHub Actions: run JS-based actions on Node 24 (see 2025–2026 Node 20 deprecation notice).
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r core/engine/requirements.txt
        
    - name: Run Tests (Python engine)
      run: |
        pytest core/engine/tests/

    - name: Set up Node
      uses: actions/setup-node@v6
      with:
        node-version: "22"
        cache: npm

    - name: Node dependencies + automation unit tests
      run: |
        npm ci
        npm test

    # `high` fails often on transitive dev/build deps (e.g. Next toolchain) while fixes lag.
    # Block on critical only; run `npm audit` locally or in Dependabot for full visibility.
    - name: npm audit (critical severity+)
      run: npm audit --audit-level=critical

    - name: Next.js production build
      run: npm run build

# Optional repository secrets (Settings → Secrets and variables → Actions):
#
# POSTGRES_URL
#   Same pooled Postgres URL as production Vercel (Prisma). When set, the "Prisma migrate deploy"
#   step runs on every workflow (push/PR to main). Forks without this secret skip migrate (step succeeds).
#
# Not added by automation — you must paste the value in the GitHub UI (or gh secret set).
#
# Optional PR review: Cursor Bugbot (free tier) — https://cursor.com/docs/bugbot#setup
#
name: Agent CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    # GitHub Actions: run JS-based actions on Node 24 (see 2025–2026 Node 20 deprecation notice).
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - uses: actions/checkout@v6

    # Vercel Hobby rejects crons that run more than once per day; bad config blocks ALL production deploys.
    - name: Vercel Hobby cron guard (vercel.json)
      run: node scripts/validate-vercel-hobby-crons.mjs

    - name: Set up Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r core/engine/requirements.txt
        
    - name: Run Tests (Python engine)
      run: |
        pytest core/engine/tests/

    - name: Set up Node
      uses: actions/setup-node@v6
      with:
        node-version: "22"
        cache: npm

    - name: Node dependencies + automation unit tests
      run: |
        npm ci
        npm test

    # When POSTGRES_URL is configured as a repo secret, apply pending Prisma migrations (no-op if none).
    - name: Prisma migrate deploy (optional)
      env:
        POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
      run: |
        if [ -z "$POSTGRES_URL" ]; then
          echo "Skip: POSTGRES_URL secret not set (configure in repo settings to run migrations in CI)."
        else
          npx prisma migrate deploy
        fi

    # `high` fails often on transitive dev/build deps (e.g. Next toolchain) while fixes lag.
    # Block on critical only; run `npm audit` locally or in Dependabot for full visibility.
    - name: npm audit (critical severity+)
      run: npm audit --audit-level=critical

    - name: Next.js production build
      run: npm run build

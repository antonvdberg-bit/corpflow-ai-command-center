name: Agent CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: "3.12"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run Tests (Python engine)
      run: |
        pytest core/engine/tests/

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: npm

    - name: Node dependencies + automation unit tests
      run: |
        npm ci
        npm test

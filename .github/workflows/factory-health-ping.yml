# Runs in GitHub cloud — no laptop required.
# Set repository secret: CORPFLOW_FACTORY_HEALTH_URL = https://YOUR_DOMAIN/api/factory/health
# If unset, the job exits 0 (skipped) so forks/CI stay green.

name: Factory health ping

on:
  schedule:
    - cron: "0 14 * * 1" # Mondays 14:00 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /api/factory/health
        env:
          URL: ${{ secrets.CORPFLOW_FACTORY_HEALTH_URL }}
        run: |
          set -euo pipefail
          if [ -z "${URL:-}" ]; then
            echo "CORPFLOW_FACTORY_HEALTH_URL is not set — skipping (set secret to enable)."
            exit 0
          fi
          code=$(curl -sS -o body.json -w "%{http_code}" "$URL" || echo "000")
          echo "HTTP $code"
          head -c 4000 body.json || true
          echo
          if [ "$code" != "200" ]; then
            echo "::error::Expected HTTP 200 from factory health, got $code"
            exit 1
          fi
          if ! grep -q '"ok"' body.json; then
            echo "::error::Response missing ok field"
            exit 1
          fi
          python3 - <<'PY'
          import json, sys
          with open("body.json") as f:
              data = json.load(f)
          if data.get("ok") is not True:
              print("::error::factory health ok is not true:", data.get("ok"))
              sys.exit(1)
          print("Factory health: ok=true")
          PY

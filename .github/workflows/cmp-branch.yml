# CMP — Sandbox branch: create `cmp/{ticket_id}` from a base ref.
# Triggered by repository_dispatch (event_type cmp_sandbox_start) from Vercel after approve-build,
# or manually via workflow_dispatch.

name: CMP Sandbox Branch

on:
  workflow_dispatch:
    inputs:
      ticket_id:
        description: 'Stable CMP ticket id (Postgres cmp_tickets.id)'
        required: true
        type: string
      base_ref:
        description: 'Git ref to branch from (e.g. main)'
        required: true
        default: main
        type: string
  repository_dispatch:
    types: [cmp_sandbox_start]

concurrency:
  group: cmp-sandbox-${{ github.event.client_payload.ticket_id || github.event.inputs.ticket_id }}
  cancel-in-progress: false

jobs:
  create-branch:
    name: Create sandbox branch
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Resolve ticket and base ref
        id: meta
        run: |
          T="${{ github.event.client_payload.ticket_id || github.event.inputs.ticket_id }}"
          B="${{ github.event.client_payload.base_ref || github.event.inputs.base_ref || 'main' }}"
          T=$(echo "$T" | tr -cd '[:alnum:]_.-')
          B=$(echo "$B" | tr -cd '[:alnum:]_./-')
          echo "ticket=$T" >> "$GITHUB_OUTPUT"
          echo "base=${B:-main}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push cmp/${{ steps.meta.outputs.ticket }}
        run: |
          set -e
          TICKET="${{ steps.meta.outputs.ticket }}"
          BASE_REF="${{ steps.meta.outputs.base }}"
          if [ -z "$TICKET" ]; then echo "Missing ticket_id"; exit 1; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "$BASE_REF"
          git checkout -B "cmp/${TICKET}" "origin/${BASE_REF}"
          git push -u origin "HEAD:refs/heads/cmp/${TICKET}" --force

      - name: Ensure PR exists for cmp/${{ steps.meta.outputs.ticket }}
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TICKET="${{ steps.meta.outputs.ticket }}"
          BASE="${{ steps.meta.outputs.base }}"
          OWNER_REPO="${{ github.repository }}"
          OWNER="$(echo "$OWNER_REPO" | cut -d/ -f1)"
          REPO="$(echo "$OWNER_REPO" | cut -d/ -f2)"
          HEAD="${OWNER}:cmp/${TICKET}"

          # If PR already exists, reuse it.
          EXISTING_JSON="$(curl -sS -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${OWNER}/${REPO}/pulls?state=open&head=$(python - <<'PY'\nimport urllib.parse\nprint(urllib.parse.quote('''"${HEAD}"'''))\nPY)&base=$(python - <<'PY'\nimport urllib.parse\nprint(urllib.parse.quote('''"${BASE}"'''))\nPY)")"
          PR_NUMBER="$(echo "$EXISTING_JSON" | python - <<'PY'\nimport json,sys\ntry:\n  arr=json.load(sys.stdin)\n  print(arr[0].get('number','') if arr else '')\nexcept Exception:\n  print('')\nPY)"
          PR_URL="$(echo "$EXISTING_JSON" | python - <<'PY'\nimport json,sys\ntry:\n  arr=json.load(sys.stdin)\n  print(arr[0].get('html_url','') if arr else '')\nexcept Exception:\n  print('')\nPY)"

          if [ -z "$PR_NUMBER" ]; then
            TITLE="CMP ${TICKET}: sandbox branch"
            BODY="Auto-created by CMP automation.\n\n- Ticket: ${TICKET}\n- Base: ${BASE}\n- Head: cmp/${TICKET}\n"
            CREATE_JSON="$(curl -sS -X POST -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${OWNER}/${REPO}/pulls" \
              -d "$(python - <<'PY'\nimport json\nprint(json.dumps({\n  'title': '''"${TITLE}"''',\n  'head': '''"cmp/${TICKET}"''',\n  'base': '''"${BASE}"''',\n  'body': '''"${BODY}"'''\n}))\nPY)")"
            PR_NUMBER="$(echo "$CREATE_JSON" | python - <<'PY'\nimport json,sys\ntry:\n  obj=json.load(sys.stdin)\n  print(obj.get('number',''))\nexcept Exception:\n  print('')\nPY)"
            PR_URL="$(echo "$CREATE_JSON" | python - <<'PY'\nimport json,sys\ntry:\n  obj=json.load(sys.stdin)\n  print(obj.get('html_url',''))\nexcept Exception:\n  print('')\nPY)"
          fi

          echo "number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "url=${PR_URL}" >> "$GITHUB_OUTPUT"

      - name: Callback to Change Console (optional)
        if: ${{ secrets.CMP_AUTOMATION_CALLBACK_URL != '' && secrets.CMP_AUTOMATION_CALLBACK_SECRET != '' }}
        env:
          CALLBACK_URL: ${{ secrets.CMP_AUTOMATION_CALLBACK_URL }}
          CALLBACK_SECRET: ${{ secrets.CMP_AUTOMATION_CALLBACK_SECRET }}
        run: |
          set -e
          TICKET="${{ steps.meta.outputs.ticket }}"
          BASE="${{ steps.meta.outputs.base }}"
          PR_NUMBER="${{ steps.pr.outputs.number }}"
          PR_URL="${{ steps.pr.outputs.url }}"
          curl -sS -X POST "$CALLBACK_URL" \
            -H "Content-Type: application/json" \
            -H "x-cmp-automation-secret: $CALLBACK_SECRET" \
            -d "$(python - <<'PY'\nimport json\nprint(json.dumps({\n  'event': 'cmp_pr_ready',\n  'ticket_id': '''"${TICKET}"''',\n  'base_ref': '''"${BASE}"''',\n  'branch_name': '''"cmp/${TICKET}"''',\n  'pr_number': int('''"${PR_NUMBER}"''' or '0') or None,\n  'pr_url': '''"${PR_URL}"''' or None\n}))\nPY)" >/dev/null

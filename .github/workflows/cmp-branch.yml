# CMP — Sandbox branch: create `cmp/{ticket_id}` from a base ref.
# Triggered by repository_dispatch (event_type cmp_sandbox_start) from Vercel after approve-build,
# or manually via workflow_dispatch.

name: CMP Sandbox Branch

on:
  workflow_dispatch:
    inputs:
      ticket_id:
        description: 'Stable CMP ticket id (Postgres cmp_tickets.id)'
        required: true
        type: string
      base_ref:
        description: 'Git ref to branch from (e.g. main)'
        required: true
        default: main
        type: string
  repository_dispatch:
    types: [cmp_sandbox_start]

concurrency:
  group: cmp-sandbox-${{ github.event.client_payload.ticket_id || github.event.inputs.ticket_id }}
  cancel-in-progress: false

jobs:
  create-branch:
    name: Create sandbox branch
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
      pull-requests: write
      # workflow_dispatch from this job (Agent CI + Vercel env check on cmp/*).
      actions: write
    steps:
      - name: Resolve ticket and base ref
        id: meta
        run: |
          T="${{ github.event.client_payload.ticket_id || github.event.inputs.ticket_id }}"
          B="${{ github.event.client_payload.base_ref || github.event.inputs.base_ref || 'main' }}"
          T=$(echo "$T" | tr -cd '[:alnum:]_.-')
          B=$(echo "$B" | tr -cd '[:alnum:]_./-')
          echo "ticket=$T" >> "$GITHUB_OUTPUT"
          echo "base=${B:-main}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push cmp/${{ steps.meta.outputs.ticket }}
        run: |
          set -euo pipefail
          TICKET="${{ steps.meta.outputs.ticket }}"
          BASE_REF="${{ steps.meta.outputs.base }}"
          if [ -z "$TICKET" ]; then echo "Missing ticket_id"; exit 1; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "$BASE_REF"
          git checkout -B "cmp/${TICKET}" "origin/${BASE_REF}"
          git push -u origin "HEAD:refs/heads/cmp/${TICKET}" --force
          # GitHub POST /repos/.../pulls returns HTTP 422 when head and base are the same SHA
          # ("No commits between main and cmp/..."). One empty commit makes the PR creatable.
          git commit --allow-empty -m "chore(cmp): sandbox branch for ${TICKET}"
          git push origin "HEAD:refs/heads/cmp/${TICKET}"

      - name: Ensure PR exists for cmp/${{ steps.meta.outputs.ticket }}
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TICKET: ${{ steps.meta.outputs.ticket }}
          BASE: ${{ steps.meta.outputs.base }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          OWNER="$(echo "$GITHUB_REPOSITORY" | cut -d/ -f1)"
          REPO="$(echo "$GITHUB_REPOSITORY" | cut -d/ -f2)"
          HEAD="${OWNER}:cmp/${TICKET}"

          HEAD_Q=$(HEAD="$HEAD" python -c "import os, urllib.parse; print(urllib.parse.quote(os.environ['HEAD'], safe=''))")
          BASE_Q=$(BASE="$BASE" python -c "import os, urllib.parse; print(urllib.parse.quote(os.environ['BASE'], safe=''))")

          EXISTING_JSON="$(curl -sSf -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${OWNER}/${REPO}/pulls?state=open&head=${HEAD_Q}&base=${BASE_Q}")"

          PR_NUMBER="$(echo "$EXISTING_JSON" | python -c "
          import json, sys
          try:
              arr = json.load(sys.stdin)
              if isinstance(arr, list) and arr:
                  print(arr[0].get('number', '') or '')
              else:
                  print('')
          except Exception:
              print('')
          ")"

          PR_URL="$(echo "$EXISTING_JSON" | python -c "
          import json, sys
          try:
              arr = json.load(sys.stdin)
              if isinstance(arr, list) and arr:
                  print(arr[0].get('html_url', '') or '')
              else:
                  print('')
          except Exception:
              print('')
          ")"

          if [ -z "$PR_NUMBER" ]; then
            TITLE="CMP ${TICKET}: sandbox branch"
            BODY="Auto-created by CMP automation.

          - Ticket: ${TICKET}
          - Base: ${BASE}
          - Head: cmp/${TICKET}
          "
            BODY_JSON=$(TITLE="$TITLE" BODY="$BODY" TICKET="$TICKET" BASE="$BASE" python -c "
          import json, os
          t = os.environ['TICKET']
          print(json.dumps({
              'title': os.environ['TITLE'],
              'head': f'cmp/{t}',
              'base': os.environ['BASE'],
              'body': os.environ['BODY'],
          }))
          ")
            CREATE_JSON="$(curl -sSf -X POST -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${OWNER}/${REPO}/pulls" \
              -d "$BODY_JSON")"
            PR_NUMBER="$(echo "$CREATE_JSON" | python -c "
          import json, sys
          try:
              print(json.load(sys.stdin).get('number', '') or '')
          except Exception:
              print('')
          ")"
            PR_URL="$(echo "$CREATE_JSON" | python -c "
          import json, sys
          try:
              print(json.load(sys.stdin).get('html_url', '') or '')
          except Exception:
              print('')
          ")"
            if [ -z "$PR_NUMBER" ]; then
              echo "::error title=CMP PR creation failed::GitHub API returned no PR number. Response: ${CREATE_JSON:0:500}"
              exit 1
            fi
          fi

          echo "number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "url=${PR_URL}" >> "$GITHUB_OUTPUT"

      # Keeps sandbox PR mergeable when main has moved since the sandbox branch was created.
      - name: Merge base ref into sandbox branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TICKET: ${{ steps.meta.outputs.ticket }}
          BASE: ${{ steps.meta.outputs.base }}
        run: |
          set -euo pipefail
          BR="cmp/${TICKET}"
          CODE=$(curl -sS -o /tmp/cmp_merge_body -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/merges" \
            -d "{\"base\":\"${BR}\",\"head\":\"${BASE}\",\"commit_message\":\"chore(cmp): merge ${BASE} into ${BR} (automation)\"}") || CODE="000"
          if [ "$CODE" = "201" ]; then
            echo "Merged ${BASE} into ${BR}."
          elif [ "$CODE" = "409" ] || [ "$CODE" = "404" ]; then
            echo "::notice::Merge ${BASE}→${BR} not applied (HTTP ${CODE}). Branch may already match base or needs manual resolution."
          else
            echo "::notice::Merge ${BASE}→${BR} HTTP ${CODE} $(head -c 300 /tmp/cmp_merge_body 2>/dev/null || true)"
          fi

      # GitHub suppresses some workflows when the only activity is actions using GITHUB_TOKEN on the same repo.
      # Run after merge so checks target the latest sandbox HEAD (includes base when merge succeeded).
      - name: Trigger PR checks (Agent CI + Vercel env check)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TICKET: ${{ steps.meta.outputs.ticket }}
        run: |
          set -euo pipefail
          BR="cmp/${TICKET}"
          gh workflow run "Agent CI" --repo "${{ github.repository }}" --ref "$BR" \
            || { echo "::warning::Could not dispatch Agent CI (permissions or workflow name)."; true; }
          gh workflow run "Vercel env check" --repo "${{ github.repository }}" --ref "$BR" \
            || { echo "::warning::Could not dispatch Vercel env check."; true; }

      - name: Resolve latest READY Vercel preview URL (optional)
        id: vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          TICKET: ${{ steps.meta.outputs.ticket }}
        run: |
          set -euo pipefail
          if [ -z "${VERCEL_TOKEN:-}" ] || [ -z "${VERCEL_PROJECT_ID:-}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Vercel preview lookup skipped: set secrets VERCEL_TOKEN and VERCEL_PROJECT_ID."
            exit 0
          fi
          BR="cmp/${TICKET}"
          Q="projectId=${VERCEL_PROJECT_ID}&limit=40&target=preview"
          if [ -n "${VERCEL_TEAM_ID:-}" ]; then Q="${Q}&teamId=${VERCEL_TEAM_ID}"; fi
          RESP="$(curl -sS -H "Authorization: Bearer ${VERCEL_TOKEN}" "https://api.vercel.com/v6/deployments?${Q}")"
          PREVIEW_URL="$(echo "$RESP" | python -c "
          import json, sys
          try:
            data=json.load(sys.stdin)
            ds=data.get('deployments') or []
            br='${BR}'
            ready=[d for d in ds if isinstance(d, dict) and d.get('readyState')=='READY' and (d.get('meta') or {}).get('githubCommitRef')==br]
            ready.sort(key=lambda d: d.get('createdAt') or 0, reverse=True)
            u=(ready[0].get('url') if ready else '') or ''
            u=u.strip()
            if u and not u.startswith('http'): u='https://' + u
            print(u)
          except Exception:
            print('')
          ")"
          if [ -z "$PREVIEW_URL" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::No READY preview deployment found yet for ${BR}."
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "preview_url=${PREVIEW_URL}" >> "$GITHUB_OUTPUT"
          echo "::notice::Resolved preview URL: ${PREVIEW_URL}"

      - name: Preview verification (optional; writes visual_check)
        id: pv
        if: steps.vercel.outputs.skip != 'true'
        env:
          PREVIEW_URL: ${{ steps.vercel.outputs.preview_url }}
          TICKET_ID: ${{ steps.meta.outputs.ticket }}
          TENANT_ID: root
          PREVIEW_VERIFY_CONFIG: config/preview-verify.v1.json
          OUTPUT_DIR: artifacts/preview-verify
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          npm ci
          npx playwright install --with-deps chromium
          node scripts/preview-verify.mjs > /tmp/visual_check.json
          {
            echo "visual_check_json<<__VC__"
            cat /tmp/visual_check.json
            echo ""
            echo "__VC__"
          } >> "$GITHUB_OUTPUT"
          echo "::notice::preview-verify wrote visual_check JSON"

      # Posts PR metadata back to Vercel/Postgres. Does not run during Vercel build — see .env.template.
      # Note: `secrets` cannot be used in step `if:` — skip inside the script when unset (GitHub validates `if` before secrets exist).
      - name: Callback to Change Console (optional)
        env:
          CALLBACK_URL: ${{ secrets.CMP_AUTOMATION_CALLBACK_URL }}
          CALLBACK_SECRET: ${{ secrets.CMP_AUTOMATION_CALLBACK_SECRET }}
          TICKET: ${{ steps.meta.outputs.ticket }}
          BASE: ${{ steps.meta.outputs.base }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          PR_URL: ${{ steps.pr.outputs.url }}
          PREVIEW_URL: ${{ steps.vercel.outputs.preview_url }}
          VISUAL_CHECK_JSON: ${{ steps.pv.outputs.visual_check_json }}
        run: |
          set -uo pipefail
          if [ -z "${CALLBACK_URL:-}" ] || [ -z "${CALLBACK_SECRET:-}" ]; then
            echo "CMP callback skipped: set repository secrets CMP_AUTOMATION_CALLBACK_URL and CMP_AUTOMATION_CALLBACK_SECRET to enable."
            exit 0
          fi
          PAYLOAD=$(TICKET="$TICKET" BASE="$BASE" PR_NUMBER="${PR_NUMBER:-}" PR_URL="${PR_URL:-}" PREVIEW_URL="${PREVIEW_URL:-}" VISUAL_CHECK_JSON="${VISUAL_CHECK_JSON:-}" python -c "
          import json, os
          raw = (os.environ.get('PR_NUMBER') or '').strip()
          n = int(raw) if raw.isdigit() else None
          url = (os.environ.get('PR_URL') or '').strip() or None
          preview = (os.environ.get('PREVIEW_URL') or '').strip() or None
          vc_raw = (os.environ.get('VISUAL_CHECK_JSON') or '').strip()
          vc = None
          if vc_raw:
              try:
                  vc = json.loads(vc_raw)
              except Exception:
                  vc = None
          out = {
              'event': 'cmp_pr_ready',
              'ticket_id': os.environ['TICKET'],
              'base_ref': os.environ['BASE'],
              'branch_name': 'cmp/' + os.environ['TICKET'],
              'pr_number': n,
              'pr_url': url,
          }
          if preview: out['preview_url'] = preview
          if vc and isinstance(vc, dict): out['visual_check'] = vc
          print(json.dumps(out))
          ")
          CODE=$(curl -sS -o /tmp/cmp_cb_body -w "%{http_code}" -X POST "$CALLBACK_URL" \
            -H "Content-Type: application/json" \
            -H "x-cmp-automation-secret: $CALLBACK_SECRET" \
            -d "$PAYLOAD") || CODE="000"
          if [ "$CODE" != "200" ]; then
            echo "::warning title=CMP automation-callback::HTTP ${CODE} — sandbox branch and PR steps already succeeded. If 401/503, set the same shared secret in Vercel (CMP_AUTOMATION_CALLBACK_SECRET) and GitHub (CMP_AUTOMATION_CALLBACK_SECRET). Body: $(head -c 400 /tmp/cmp_cb_body 2>/dev/null || true)"
          fi

# CMP — Sandbox branch: create `cmp/{ticket_id}` from a base ref.
# Triggered by repository_dispatch (event_type cmp_sandbox_start) from Vercel after approve-build,
# or manually via workflow_dispatch.

name: CMP Sandbox Branch

on:
  workflow_dispatch:
    inputs:
      ticket_id:
        description: 'Stable CMP ticket id (Postgres cmp_tickets.id)'
        required: true
        type: string
      base_ref:
        description: 'Git ref to branch from (e.g. main)'
        required: true
        default: main
        type: string
  repository_dispatch:
    types: [cmp_sandbox_start]

concurrency:
  group: cmp-sandbox-${{ github.event.client_payload.ticket_id || github.event.inputs.ticket_id }}
  cancel-in-progress: false

jobs:
  create-branch:
    name: Create sandbox branch
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Resolve ticket and base ref
        id: meta
        run: |
          T="${{ github.event.client_payload.ticket_id || github.event.inputs.ticket_id }}"
          B="${{ github.event.client_payload.base_ref || github.event.inputs.base_ref || 'main' }}"
          T=$(echo "$T" | tr -cd '[:alnum:]_.-')
          B=$(echo "$B" | tr -cd '[:alnum:]_./-')
          echo "ticket=$T" >> "$GITHUB_OUTPUT"
          echo "base=${B:-main}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push cmp/${{ steps.meta.outputs.ticket }}
        run: |
          set -euo pipefail
          TICKET="${{ steps.meta.outputs.ticket }}"
          BASE_REF="${{ steps.meta.outputs.base }}"
          if [ -z "$TICKET" ]; then echo "Missing ticket_id"; exit 1; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "$BASE_REF"
          git checkout -B "cmp/${TICKET}" "origin/${BASE_REF}"
          git push -u origin "HEAD:refs/heads/cmp/${TICKET}" --force
          # GitHub POST /repos/.../pulls returns HTTP 422 when head and base are the same SHA
          # ("No commits between main and cmp/..."). One empty commit makes the PR creatable.
          git commit --allow-empty -m "chore(cmp): sandbox branch for ${TICKET}"
          git push origin "HEAD:refs/heads/cmp/${TICKET}"

      - name: Ensure PR exists for cmp/${{ steps.meta.outputs.ticket }}
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TICKET: ${{ steps.meta.outputs.ticket }}
          BASE: ${{ steps.meta.outputs.base }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          OWNER="$(echo "$GITHUB_REPOSITORY" | cut -d/ -f1)"
          REPO="$(echo "$GITHUB_REPOSITORY" | cut -d/ -f2)"
          HEAD="${OWNER}:cmp/${TICKET}"

          HEAD_Q=$(HEAD="$HEAD" python -c "import os, urllib.parse; print(urllib.parse.quote(os.environ['HEAD'], safe=''))")
          BASE_Q=$(BASE="$BASE" python -c "import os, urllib.parse; print(urllib.parse.quote(os.environ['BASE'], safe=''))")

          EXISTING_JSON="$(curl -sSf -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${OWNER}/${REPO}/pulls?state=open&head=${HEAD_Q}&base=${BASE_Q}")"

          PR_NUMBER="$(echo "$EXISTING_JSON" | python -c "
          import json, sys
          try:
              arr = json.load(sys.stdin)
              if isinstance(arr, list) and arr:
                  print(arr[0].get('number', '') or '')
              else:
                  print('')
          except Exception:
              print('')
          ")"

          PR_URL="$(echo "$EXISTING_JSON" | python -c "
          import json, sys
          try:
              arr = json.load(sys.stdin)
              if isinstance(arr, list) and arr:
                  print(arr[0].get('html_url', '') or '')
              else:
                  print('')
          except Exception:
              print('')
          ")"

          if [ -z "$PR_NUMBER" ]; then
            TITLE="CMP ${TICKET}: sandbox branch"
            BODY="Auto-created by CMP automation.

          - Ticket: ${TICKET}
          - Base: ${BASE}
          - Head: cmp/${TICKET}
          "
            BODY_JSON=$(TITLE="$TITLE" BODY="$BODY" TICKET="$TICKET" BASE="$BASE" python -c "
          import json, os
          t = os.environ['TICKET']
          print(json.dumps({
              'title': os.environ['TITLE'],
              'head': f'cmp/{t}',
              'base': os.environ['BASE'],
              'body': os.environ['BODY'],
          }))
          ")
            CREATE_JSON="$(curl -sSf -X POST -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${OWNER}/${REPO}/pulls" \
              -d "$BODY_JSON")"
            PR_NUMBER="$(echo "$CREATE_JSON" | python -c "
          import json, sys
          try:
              print(json.load(sys.stdin).get('number', '') or '')
          except Exception:
              print('')
          ")"
            PR_URL="$(echo "$CREATE_JSON" | python -c "
          import json, sys
          try:
              print(json.load(sys.stdin).get('html_url', '') or '')
          except Exception:
              print('')
          ")"
            if [ -z "$PR_NUMBER" ]; then
              echo "::error title=CMP PR creation failed::GitHub API returned no PR number. Response: ${CREATE_JSON:0:500}"
              exit 1
            fi
          fi

          echo "number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "url=${PR_URL}" >> "$GITHUB_OUTPUT"

      # Posts PR metadata back to Vercel/Postgres. Does not run during Vercel build — see .env.template.
      # Note: `secrets` cannot be used in step `if:` — skip inside the script when unset (GitHub validates `if` before secrets exist).
      - name: Callback to Change Console (optional)
        env:
          CALLBACK_URL: ${{ secrets.CMP_AUTOMATION_CALLBACK_URL }}
          CALLBACK_SECRET: ${{ secrets.CMP_AUTOMATION_CALLBACK_SECRET }}
          TICKET: ${{ steps.meta.outputs.ticket }}
          BASE: ${{ steps.meta.outputs.base }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          PR_URL: ${{ steps.pr.outputs.url }}
        run: |
          set -uo pipefail
          if [ -z "${CALLBACK_URL:-}" ] || [ -z "${CALLBACK_SECRET:-}" ]; then
            echo "CMP callback skipped: set repository secrets CMP_AUTOMATION_CALLBACK_URL and CMP_AUTOMATION_CALLBACK_SECRET to enable."
            exit 0
          fi
          PAYLOAD=$(TICKET="$TICKET" BASE="$BASE" PR_NUMBER="${PR_NUMBER:-}" PR_URL="${PR_URL:-}" python -c "
          import json, os
          raw = (os.environ.get('PR_NUMBER') or '').strip()
          n = int(raw) if raw.isdigit() else None
          url = (os.environ.get('PR_URL') or '').strip() or None
          print(json.dumps({
              'event': 'cmp_pr_ready',
              'ticket_id': os.environ['TICKET'],
              'base_ref': os.environ['BASE'],
              'branch_name': 'cmp/' + os.environ['TICKET'],
              'pr_number': n,
              'pr_url': url,
          }))
          ")
          CODE=$(curl -sS -o /tmp/cmp_cb_body -w "%{http_code}" -X POST "$CALLBACK_URL" \
            -H "Content-Type: application/json" \
            -H "x-cmp-automation-secret: $CALLBACK_SECRET" \
            -d "$PAYLOAD") || CODE="000"
          if [ "$CODE" != "200" ]; then
            echo "::warning title=CMP automation-callback::HTTP ${CODE} — sandbox branch and PR steps already succeeded. If 401/503, set the same shared secret in Vercel (CMP_AUTOMATION_CALLBACK_SECRET) and GitHub (CMP_AUTOMATION_CALLBACK_SECRET). Body: $(head -c 400 /tmp/cmp_cb_body 2>/dev/null || true)"
          fi

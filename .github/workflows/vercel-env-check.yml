# Validates that required Vercel environment variables exist for the linked project.
# Add GitHub repository secrets (Settings → Secrets):
#   VERCEL_TOKEN           — Vercel token with access to the project (Account Settings → Tokens).
#   VERCEL_PROJECT_ID      — Project id (prj_...); from Project Settings → General or .vercel/project.json "projectId".
#   VERCEL_TEAM_ID         — team_... (preferred if you named the secret this way).
#   VERCEL_ORG_ID          — optional alias of team id (same value as VERCEL_TEAM_ID); scripts accept either.
#
# Optional: set repository variable VERCEL_ENV_COMPREHENSIVE=true to also enforce comprehensive_important_keys
# (see vanguard/vercel-env-policy.json).

name: Vercel env check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  vercel-env:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      # Pinned SHAs — see test.yml for bump commands
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: "22"

      - name: Check Vercel env (API)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        run: |
          set -e
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::error title=Vercel env check misconfigured::Missing required GitHub repo secrets VERCEL_TOKEN and/or VERCEL_PROJECT_ID."
            exit 1
          fi
          EXTRA=""
          if [ "${{ vars.VERCEL_ENV_COMPREHENSIVE }}" = "true" ]; then
            EXTRA="--comprehensive"
          fi
          node scripts/vercel-env.mjs check --backend=api $EXTRA

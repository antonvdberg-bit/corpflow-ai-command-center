# Validates that required Vercel environment variables exist for the linked project.
# Add GitHub repository secrets (Settings → Secrets):
#   VERCEL_TOKEN           — Vercel token with access to the project (Account Settings → Tokens).
#   VERCEL_ORG_ID          — Team / org id (same as VERCEL_TEAM_ID); from Vercel team settings URL or .vercel/project.json "orgId".
#   VERCEL_PROJECT_ID      — Project id (prj_...); from Project Settings → General or .vercel/project.json "projectId".
#
# Optional: set repository variable VERCEL_ENV_COMPREHENSIVE=true to also enforce comprehensive_important_keys
# (see vanguard/vercel-env-policy.json).

name: Vercel env check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  vercel-env:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Check Vercel env (API)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -e
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Skip: VERCEL_TOKEN and VERCEL_PROJECT_ID secrets not both set."
            exit 0
          fi
          EXTRA=""
          if [ "${{ vars.VERCEL_ENV_COMPREHENSIVE }}" = "true" ]; then
            EXTRA="--comprehensive"
          fi
          node scripts/vercel-env.mjs check --backend api $EXTRA

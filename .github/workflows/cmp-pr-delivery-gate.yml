# Block merging cmp/* PRs that change zero files vs main (no empty squash "delivery").
# Add job "cmp-delivery-files" as a required check on main branch protection.
#
# Draft PRs are skipped so work can start without failing until marked ready for review.

name: CMP PR delivery gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

jobs:
  cmp-delivery-files:
    if: ${{ startsWith(github.head_ref, 'cmp/') && github.event.pull_request.draft == false }}
    name: cmp-delivery-files
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Require at least one changed file vs base
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100,
            });
            if (!files.length) {
              core.setFailed(
                'This CMP PR (cmp/*) changes no files vs the base branch. Do not squash-merge an empty delivery — add commits that implement the ticket, then merge. See docs/operations/CMP_PR_DELIVERY_GATE.md',
              );
              return;
            }
            core.info(`OK: ${files.length} file change(s) in PR #${pr.number}`);

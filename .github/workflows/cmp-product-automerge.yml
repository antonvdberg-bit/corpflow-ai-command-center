# Product automation: after Agent CI succeeds on a PR from cmp/<ticket_id>, merge into main.
# Vercel (or your host) should deploy production on pushes to main — no manual Cursor push required.
#
# Enable with GitHub repo variable: CMP_AUTO_MERGE = true
# Disable (default): omit the variable or set to anything other than true.

name: CMP product auto-merge

on:
  workflow_run:
    workflows: ['Agent CI']
    types:
      - completed

jobs:
  merge-cmp-pr:
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      vars.CMP_AUTO_MERGE == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Merge open PR for cmp branch
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const headBranch = run.head_branch || '';
            if (!headBranch.startsWith('cmp/')) {
              core.info(`Skip: head branch is not cmp/* (${headBranch})`);
              return;
            }
            const [owner, repo] = process.env.GITHUB_REPOSITORY.split('/');
            const head = `${owner}:${headBranch}`;

            const { data: prs } = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head,
              base: 'main',
              per_page: 5,
            });

            if (!prs.length) {
              core.info(`No open PR found for head=${head} base=main`);
              return;
            }

            const pr = prs[0];
            core.info(`Merging PR #${pr.number} (${pr.html_url})`);

            await github.rest.pulls.merge({
              owner,
              repo,
              pull_number: pr.number,
              merge_method: 'merge',
            });

            core.info('Merge completed');
